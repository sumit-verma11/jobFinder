services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: jobpilot
      POSTGRES_DB: jobpilot
    ports:
      - "5432:5432"
    volumes:
      - jobpilot_pgdata:/var/lib/postgresql/data

volumes:
  jobpilot_pgdata:
